<svg xmlns="http://www.w3.org/2000/svg" width="880" height="100" viewBox="0 0 880 100" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Footer">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b949e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8b949e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b949e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="880" height="100" rx="6" fill="#0d1117"/>
  <rect x="1" y="1" width="878" height="98" rx="5" fill="none" stroke="#30363d"/>
  <text x="440" y="40" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="3" fill="#58a6ff">PETERCHENG.DEV</text>
  <text x="440" y="62" text-anchor="middle" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#c9d1d9">A good email beats a bad meeting.</text>
  <text x="440" y="82" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#6e7681">OPEN TO SUMMER 2026  ·  LIGHTSPACE VOL. 01</text>
  <!-- side nodes -->
  <circle cx="48" cy="50" r="3" fill="#58a6ff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="832" cy="50" r="3" fill="#a371f7">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
