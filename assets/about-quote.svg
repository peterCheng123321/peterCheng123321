  <text x="48" y="42" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#e6edf3">A habit of picking up the hard part of the stack —</text>
