<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Zhongquan (Peter) Cheng — LightSpace</title>
  <desc id="desc">Editorial header for petercheng.dev</desc>
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b949e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8b949e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b949e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#58a6ff" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#a371f7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#58a6ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#8b949e" stroke-opacity="0.1" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- canvas -->
  <rect width="880" height="320" rx="8" fill="#0d1117"/>
  <rect width="880" height="320" rx="8" fill="url(#grid)"/>
  <ellipse cx="700" cy="120" rx="220" ry="160" fill="url(#orb)"/>

  <!-- frame -->
  <rect x="20" y="20" width="840" height="280" rx="4" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- top meta row -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="2.5">
    <text x="44" y="52" fill="#8b949e">PETERCHENG.DEV</text>
    <text x="44" y="70" fill="#6e7681" letter-spacing="2">PORTFOLIO · VOL. 01</text>
    <text x="836" y="52" text-anchor="end" fill="#6e7681" letter-spacing="2">38.627° N</text>
    <text x="836" y="70" text-anchor="end" fill="#6e7681" letter-spacing="2">ST. LOUIS, MO</text>
  </g>

  <!-- name block — left half, clear of network -->
  <g font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="44" y="130" font-size="36" font-weight="600" fill="#e6edf3" letter-spacing="-0.5">Zhongquan Cheng.</text>
    <text x="44" y="158" font-size="14" fill="#8b949e">Software engineer &amp; researcher</text>
    <text x="44" y="178" font-size="13" fill="#6e7681">backends · applied ML · computer vision</text>
  </g>

  <!-- focus chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="1.2">
    <rect x="44" y="198" width="78" height="24" rx="3" fill="none" stroke="#30363d"/>
    <text x="83" y="214" text-anchor="middle" fill="#c9d1d9">BACKEND</text>

    <rect x="130" y="198" width="96" height="24" rx="3" fill="none" stroke="#30363d"/>
    <text x="178" y="214" text-anchor="middle" fill="#c9d1d9">APPLIED ML</text>

    <rect x="234" y="198" width="68" height="24" rx="3" fill="none" stroke="#30363d"/>
    <text x="268" y="214" text-anchor="middle" fill="#c9d1d9">VISION</text>

    <rect x="310" y="198" width="128" height="24" rx="3" fill="none" stroke="#58a6ff" stroke-opacity="0.55"/>
    <text x="374" y="214" text-anchor="middle" fill="#58a6ff">OPEN · SUMMER 2026</text>
  </g>

  <!-- network graphic — right half only -->
  <g transform="translate(520, 88)" fill="none" stroke-linecap="round">
    <g stroke="#30363d" stroke-width="1.2">
      <path d="M30 36 L90 18 L160 58 L240 30"/>
      <path d="M90 18 L110 90 L160 58"/>
      <path d="M30 36 L60 108 L110 90"/>
      <path d="M160 58 L220 118 L240 30"/>
      <path d="M60 108 L130 138 L220 118"/>
    </g>
    <path d="M30 36 L90 18 L160 58 L220 118" stroke="url(#glow)" stroke-width="1.6"/>
    <g fill="#0d1117" stroke="#8b949e" stroke-width="1.3">
      <circle cx="30" cy="36" r="4.5"/>
      <circle cx="90" cy="18" r="4.5"/>
      <circle cx="160" cy="58" r="4.5"/>
      <circle cx="240" cy="30" r="4.5"/>
      <circle cx="110" cy="90" r="4.5"/>
      <circle cx="60" cy="108" r="4.5"/>
      <circle cx="130" cy="138" r="4.5"/>
      <circle cx="220" cy="118" r="4.5"/>
    </g>
    <circle cx="160" cy="58" r="7.5" fill="none" stroke="url(#glow)" stroke-width="1.8"/>
    <circle cx="160" cy="58" r="2.8" fill="#58a6ff"/>
  </g>

  <!-- bottom rule + integrated signal -->
  <line x1="44" y1="248" x2="836" y2="248" stroke="url(#fade)" stroke-width="1"/>

  <!-- animated signal (aligned to content margins) -->
  <g transform="translate(0, 248)">
    <path
      d="M44 28 C100 28 115 8 160 8 S220 48 270 48 S330 12 380 12 S440 44 490 44 S550 6 600 6 S660 50 710 50 S770 28 836 28"
      fill="none"
      stroke="url(#trace)"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-dasharray="820"
      stroke-dashoffset="820"
    >
      <animate attributeName="stroke-dashoffset" values="820;0;820" dur="6s" repeatCount="indefinite"/>
    </path>
    <circle r="3.2" fill="#58a6ff">
      <animateMotion dur="6s" repeatCount="indefinite"
        path="M44 28 C100 28 115 8 160 8 S220 48 270 48 S330 12 380 12 S440 44 490 44 S550 6 600 6 S660 50 710 50 S770 28 836 28"/>
    </circle>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="2" fill="#6e7681">
    <text x="44" y="286">LIGHTSPACE</text>
    <text x="836" y="286" text-anchor="end">MS CS · WASHU</text>
  </g>
</svg>
