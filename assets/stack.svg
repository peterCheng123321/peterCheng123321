<svg xmlns="http://www.w3.org/2000/svg" width="880" height="132" viewBox="0 0 880 132" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Technical competencies">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b949e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8b949e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b949e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="880" height="132" rx="6" fill="#0d1117"/>
  <rect x="1" y="1" width="878" height="130" rx="5" fill="none" stroke="#30363d"/>
  <text x="32" y="32" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="2" fill="#58a6ff">COMPETENCIES</text>
  <!-- row 1 labels -->
  <text x="32" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#6e7681">LANG</text>
  <text x="100" y="56" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#c9d1d9">Python · TypeScript · Java · C/C++ · C# · SQL · R</text>
  <text x="32" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#6e7681">ML</text>
  <text x="100" y="80" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#c9d1d9">PyTorch · TensorFlow · scikit-learn · XGBoost · OpenCV · LLMs</text>
  <text x="32" y="104" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#6e7681">SYS</text>
  <text x="100" y="104" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#c9d1d9">Node · React · Next.js · PostgreSQL · Redis · Pinecone · AWS · Docker</text>
  <!-- animated accent bar -->
  <rect x="32" y="118" width="200" height="2" rx="1" fill="#21262d"/>
  <rect x="32" y="118" width="80" height="2" rx="1" fill="#58a6ff">
    <animate attributeName="width" values="40;200;40" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
